    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../../assets/theme-style.css">
    <link rel="stylesheet" href="../../../assets/page-style.css">
    <script src="../../../assets/theme-apply.js"></script>
    <script src="../../../assets/theme-switch.js" defer></script>
</head>
<body>
<aside id="themePanel" class="panel" aria-hidden="true">
    <header class="panel__header">
        <h3 class="panel__title">Theme</h3>
        <button id="closePanel" class="panel__close" type="button" aria-label="Close theme panel">
            ×
        </button>
    </header>

    <div class="panel__content">
        <section class="panel__section">
            <label class="field">
                <span class="field__label">Preset</span>
                <select id="themePreset" class="select">
                    <option value="auto">Auto</option>
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                    <option value="custom">Custom</option>
                </select>
            </label>

            <label class="field" id="variantField" style="display: none;">
                <span class="field__label">Variant</span>
                <select id="themeVariant" class="select">
                    <option value="dark">Default</option>
                    <option value="rosewater">Rosewater</option>
                    <option value="mauve">Mauve</option>
                    <option value="red">Red</option>
                    <option value="green">Green</option>
                    <option value="blue">Blue</option>
                </select>
            </label>
        </section>

        <section class="panel__section">
            <div class="panel__sectionHead" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h4 id="paletteTitle" class="panel__sectionTitle">Active Palette</h4>
                    <p class="panel__hint" style="margin: 0;">Pick or type a hex code.</p>
                </div>
                <div class="theme-actions" style="margin-top: 15px; display: flex; gap: 8px; align-items: center;">
                    <button id="resetCustomBtn" type="button" class="panel-action-btn panel-action-btn--text">Reset</button> 
                    
                    <button id="exportThemeBtn" type="button" class="panel-action-btn">Export</button>
                    
                    <label for="importThemeInput" class="panel-action-btn">Import</label>
                    <input id="importThemeInput" type="file" accept=".json" style="display: none;">
                </div>
            </div>

            <div class="swatches">
                <div class="swatch" title="The main background color of the entire page.">
                    <span class="swatch__name">Background</span>
                    <div class="swatch__controls">
                        <input id="kBg" type="color" value="#1a1a1a" class="swatch__picker" />
                        <input id="kBgHex" type="text" inputmode="text" spellcheck="false"
                            class="swatch__hex" value="#1a1a1a" aria-label="Background hex" />
                    </div>
                </div>

                <div class="swatch" title="The background color for cards, tables, side panels, and buttons.">
                    <span class="swatch__name">Secondary BG</span>
                    <div class="swatch__controls">
                        <input id="kSrf" type="color" value="#252526" class="swatch__picker" />
                        <input id="kSrfHex" type="text" inputmode="text" spellcheck="false"
                            class="swatch__hex" value="#252526" aria-label="Secondary BG hex" />
                    </div>
                </div>

                <div class="swatch" title="The primary color used for paragraph text and basic reading.">
                    <span class="swatch__name">Text</span>
                    <div class="swatch__controls">
                        <input id="kFg" type="color" value="#e0e0e0" class="swatch__picker" />
                        <input id="kFgHex" type="text" inputmode="text" spellcheck="false"
                            class="swatch__hex" value="#e0e0e0" aria-label="Text hex" />
                    </div>
                </div>

                <div class="swatch" title="The color used to highlight links, headings, and interactive elements.">
                    <span class="swatch__name">Accent</span>
                    <div class="swatch__controls">
                        <input id="kAcc" type="color" value="#4da3ff" class="swatch__picker" />
                        <input id="kAccHex" type="text" inputmode="text" spellcheck="false"
                            class="swatch__hex" value="#4da3ff" aria-label="Accent hex" />
                    </div>
                </div>
            </div>
        </section>
    </div>
</aside>

<div id="panelBackdrop" class="backdrop" hidden></div>


    <header class="top-navbar is-stacked">
        <h1 id="page-title" class="brand-title">[CS] Quality Assurance (QA)</h1>
        <div class="controls-bar">
            <a href="index.html" class="back-link-btn">◀️ Homepage</a>
            <a href="https://corsidilaurea.uniroma1.it/en/course/33508/quality" class="original-link-btn" target="_blank" rel="noopener noreferrer">🌐 Source</a>
            <label class="font-toggle-label"><input type="checkbox" id="font-dsa-toggle"> OpenDyslexic</label>
            <a href="../it/quality.html" class="lang-btn" title="Switch language">🇬🇧 Lang</a>
            <button id="themeBtn" class="theme-toggle" aria-controls="themePanel">🌓 Theme</button>
            <button class="print-btn" onclick="window.print()">🖨️ Save as PDF</button>
        </div>
    </header>
