name: Update Professor News

on:
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch: # Allows manual triggering

jobs:
  update-professor-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Required to compare current changes with the previous commit

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Update professors list
        run: python scrape-professors.py

      - name: Run news update script
        run: python scrape-professor-news.py

      - name: Commit changes and notify
        env:
          REPO_URL: "https://github.com/${{ github.repository }}/blob/main"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # We'll store the UUIDs of professors who have actual content or link changes
          to_notify=""
          
          # Identify which common.html files have been modified or created
          # Using "|| true" to prevent the script from exiting if no matches are found
          changed_common_files=$(git status --porcelain | grep "lecturers/.*/common.html" | awk '{print $2}' || true)

          for file in $changed_common_files; do
            # Extract UUID from the directory path (lecturers/UUID/common.html)
            uuid=$(echo "$file" | cut -d'/' -f2)
            
            # Python script to extract a "fingerprint" of the content (text + all hrefs)
            # This ensures we catch changes in visible text OR in underlying link URLs
            CHECK_SCRIPT="import sys; from bs4 import BeautifulSoup; \
              html = sys.stdin.read(); \
              soup = BeautifulSoup(html, 'html.parser'); \
              text = soup.get_text(strip=True); \
              links = [a.get('href') for a in soup.find_all('a', href=True)]; \
              print(f'{text}|||{links}')"

            new_content_fingerprint=$(cat "$file" | python3 -c "$CHECK_SCRIPT")
            
            # Check if the file already exists in the latest commit
            if git ls-files --error-unmatch "$file" > /dev/null 2>&1; then
              old_content_fingerprint=$(git show HEAD:"$file" | python3 -c "$CHECK_SCRIPT")
            else
              old_content_fingerprint="NEW_FILE"
            fi

            # Trigger notification if text or any URL in an href has changed
            if [ "$new_content_fingerprint" != "$old_content_fingerprint" ]; then
              to_notify="$to_notify $uuid"
            fi
          done

          # Add all modified files to the commit (keeping the repo updated even for style-only changes)
          git add .
          
          if ! git diff --cached --quiet; then
            git commit -m "Update professor news, index pages and metadata"
            git push
            
            commit_hash=$(git rev-parse HEAD)
            
            # Send Telegram notifications for actual content updates
            for uuid in $to_notify; do
              # Retrieve the professor name from professors.json using UUID
              prof_name_raw=$(jq -r ".\"$uuid\".name" professors.json)
              
              # Format the name to Title Case
              formatted_name=$(echo "$prof_name_raw" | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')
              
              # Notification link points to the English index page
              file_url="sapienzastudents.net/sapienzafeed/lecturers/$uuid/en/index.html"
              commit_url="https://github.com/${{ github.repository }}/commit/$commit_hash"
              
              python send-professor-news-update-to-telegram.py "$formatted_name" "$file_url" "$commit_url" "${{ secrets.TELEGRAM_BOT_TOKEN }}" "${{ secrets.TELEGRAM_CHAT_ID }}"
            done
          fi