<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARRIGONI VIVIANA</title>
    <link rel="stylesheet" href="../../../assets/theme-style.css">
    <link rel="stylesheet" href="../../../assets/page-style.css">
    <script src="../../../assets/theme-switch.js"></script>
</head>
<body>
    <div class="header-dashboard">
        <h1 id="page-title">ARRIGONI VIVIANA</h1>
        <div class="header-actions">
            <div class="controls-bar"><label class="font-toggle-label"><input type="checkbox" id="font-dsa-toggle"> OpenDyslexic</label><a href="../en/index.html" class="lang-btn" title="Switch language">🇮🇹 Lingua</a><button class="theme-toggle" onclick="toggleTheme()">🌓 Tema</button></div>
<div class="navigation-bar"><a href="../../it/index.html" class="back-link-btn">◀️ Docenti</a><button class="print-btn" onclick="window.print()">🖨️ Salva come PDF</button><a href="https://corsidilaurea.uniroma1.it/it/lecturer/c9c0ea5062ab91edd804bfaeefff966cca8c6b8c21b755d269ef1add" class="original-link-btn" target="_blank" rel="noopener noreferrer">🌐 Fonte</a></div>
        </div>
    </div>
    
    <div class="docente-profile" style="display: flex; gap: 20px; align-items: center; margin-bottom: 30px;">
        <div class="docente-picture">
            <img src="https://corsidilaurea.uniroma1.it/sites/all/modules/custom/cdl_professors/images/user_picture.png" alt="" style="width: 120px; height: 120px; object-fit: cover; border-radius: 50%;">
        </div>
        <div class="docente-info">
            <p style="margin: 5px 0;"><strong>Email:</strong> </p>
            <p style="margin: 5px 0;"><strong>Struttura:</strong> Dipartimento di INFORMATICA</p>
            <p style="margin: 5px 0;"><strong>SSD:</strong> INFO-01/A</p>
        </div>
    </div>
    
    <div class="sections-content">
        <details id="details-receiving-hours" data-common-id="common-receiving-hours" style="display:none;">
            <summary class="level-h4" id="receiving-hours">Orari di ricevimento</summary>
            <div class="details-body" id="body-receiving-hours"></div>
        </details>
    </div>

    <script>
    fetch('../common.html')
        .then(response => response.text())
        .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            
            document.querySelectorAll('details[data-common-id]').forEach(details => {
                const commonId = details.getAttribute('data-common-id');
                const source = doc.getElementById(commonId);
                if (source && source.innerHTML.trim()) {
                    details.querySelector('.details-body').innerHTML = source.innerHTML;
                    details.style.display = 'block'; // Make visible if content exists
                }
            });
        })
        .catch(err => console.error('Error loading common content:', err));
    </script>
</body>
</html>
