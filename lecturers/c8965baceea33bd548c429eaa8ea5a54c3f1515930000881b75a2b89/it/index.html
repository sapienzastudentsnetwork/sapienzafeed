<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIBERATI FRANCO</title>
    <link rel="stylesheet" href="../../../assets/theme-style.css">
    <link rel="stylesheet" href="../../../assets/page-style.css">
    <script src="../../../assets/theme-apply.js"></script>
    <script src="../../../assets/theme-switch.js" defer></script>
</head>
<body>
    <aside id="themePanel" class="panel" aria-hidden="true">
    <header class="panel__header">
        <h3 class="panel__title">Tema</h3>
        <button id="closePanel" class="panel__close" type="button" aria-label="Chiudi tema">
            ×
        </button>
    </header>

    <div class="panel__content">
        <section class="panel__section">
            <label class="field">
                <span class="field__label">Preset</span>
                <select id="themePreset" class="select">
                    <option value="auto">Auto</option>
                    <option value="light">Chiaro</option>
                    <option value="dark">Scuro</option>
                    <option value="custom">Personalizzato</option>
                </select>
            </label>
        </section>

        <section class="panel__section">
            <div class="panel__sectionHead" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h4 id="paletteTitle" class="panel__sectionTitle">Palette attiva</h4>
                    <p class="panel__hint" style="margin: 0;">Scegli o digita un hex.</p>
                </div>
                <div class="theme-actions" style="margin-top: 15px; display: flex; gap: 8px; align-items: center;">
                    <button id="resetCustomBtn" type="button" class="panel-action-btn panel-action-btn--text">Reset</button> 
                    
                    <button id="exportThemeBtn" type="button" class="panel-action-btn">Esporta</button>
                    
                    <label for="importThemeInput" class="panel-action-btn">Importa</label>
                    <input id="importThemeInput" type="file" accept=".json" style="display: none;">
                </div>
            </div>

            <div class="swatches">
                <div class="swatch" title="Colore di sfondo principale dell'intera pagina.">
                    <span class="swatch__name">Sfondo</span>
                    <div class="swatch__controls">
                        <input id="kBg" type="color" value="#1a1a1a" class="swatch__picker" />
                        <input id="kBgHex" type="text" inputmode="text" spellcheck="false"
                            class="swatch__hex" value="#1a1a1a" aria-label="Hex sfondo" />
                    </div>
                </div>

                <div class="swatch" title="Colore di sfondo per schede, tabelle, pannelli e pulsanti.">
                    <span class="swatch__name">Sfondo sec.</span>
                    <div class="swatch__controls">
                        <input id="kSrf" type="color" value="#252526" class="swatch__picker" />
                        <input id="kSrfHex" type="text" inputmode="text" spellcheck="false"
                            class="swatch__hex" value="#252526" aria-label="Hex sfondo sec." />
                    </div>
                </div>

                <div class="swatch" title="Colore principale usato per il testo e la lettura.">
                    <span class="swatch__name">Testo</span>
                    <div class="swatch__controls">
                        <input id="kFg" type="color" value="#e0e0e0" class="swatch__picker" />
                        <input id="kFgHex" type="text" inputmode="text" spellcheck="false"
                            class="swatch__hex" value="#e0e0e0" aria-label="Hex testo" />
                    </div>
                </div>

                <div class="swatch" title="Colore per evidenziare link, titoli ed elementi interattivi.">
                    <span class="swatch__name">Accento</span>
                    <div class="swatch__controls">
                        <input id="kAcc" type="color" value="#4da3ff" class="swatch__picker" />
                        <input id="kAccHex" type="text" inputmode="text" spellcheck="false"
                            class="swatch__hex" value="#4da3ff" aria-label="Hex accento" />
                    </div>
                </div>
            </div>
        </section>
    </div>
</aside>

<div id="panelBackdrop" class="backdrop" hidden></div>

    
    <header class="top-navbar is-stacked">
        <h1 id="page-title" class="brand-title">LIBERATI FRANCO</h1>
        <div class="controls-bar">
            <a href="../../it/index.html" class="back-link-btn">◀️ Docenti</a>
            <a href="https://corsidilaurea.uniroma1.it/it/lecturer/c8965baceea33bd548c429eaa8ea5a54c3f1515930000881b75a2b89" class="original-link-btn" target="_blank" rel="noopener noreferrer">🌐 Fonte</a>
            <label class="font-toggle-label"><input type="checkbox" id="font-dsa-toggle"> OpenDyslexic</label>
            <a href="../en/index.html" class="lang-btn" title="Switch language">🇮🇹 Lingua</a>
            <button id="themeBtn" class="theme-toggle" aria-controls="themePanel">🌓 Tema</button>
            <button class="print-btn" onclick="window.print()">🖨️ Salva come PDF</button>
        </div>
    </header>
    
    <div class="docente-profile" style="display: flex; gap: 20px; align-items: center; margin-bottom: 30px;">
        <div class="docente-picture">
            <img src="https://corsidilaurea.uniroma1.it/sites/all/modules/custom/cdl_professors/images/user_picture.png" alt="" style="width: 120px; height: 120px; object-fit: cover;">
        </div>
        <div class="docente-info">
            <p style="margin: 5px 0;"><strong>Email:</strong> N/A</p>
            <p style="margin: 5px 0;"><strong>Struttura:</strong> </p>
            <p style="margin: 5px 0;"><strong>SSD:</strong> </p>
        </div>
    </div>
    
    <div class="sections-content">

    <button id="back-to-top" title="Torna sù">▲ Torna sù</button>
    <script src="../../../assets/page-logic.js"></script>
        <details id="details-receiving-hours" data-common-id="common-receiving-hours" style="display:none;">
            <summary class="level-h4" id="receiving-hours">Orari di ricevimento</summary>
            <div class="details-body" id="body-receiving-hours"></div>
        </details>
    </div>

    <button id="back-to-top" title="Torna sù">▲ Torna sù</button>

    <script>
    fetch('../common.html')
        .then(response => response.text())
        .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            
            document.querySelectorAll('details[data-common-id]').forEach(details => {
                const commonId = details.getAttribute('data-common-id');
                const source = doc.getElementById(commonId);
                if (source && source.innerHTML.trim()) {
                    details.querySelector('.details-body').innerHTML = source.innerHTML;
                    details.style.display = 'block'; // Make visible if content exists
                }
            });
        })
        .catch(err => console.error('Error loading common content:', err));
    </script>
</body>
</html>
