<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sapienzafeed</title>
    <link rel="stylesheet" href="assets/theme-style.css">
    <link rel="stylesheet" href="assets/index-style.css">
    <script src="assets/theme-apply.js"></script>
    <script src="assets/theme-switch.js" defer></script>
</head>
<body>
    <div id="theme-panel-container"></div>

    <header class="top-navbar">
        <h1 id="page-title" class="brand-title">sapienzafeed</h1>
        <div class="controls-bar">
            <label class="font-toggle-label"><input type="checkbox" id="font-dsa-toggle"> OpenDyslexic</label>
            
            <button id="themeBtn" class="theme-toggle" aria-controls="themePanel">🌓 Theme</button>
            
        </div>
    </header>

    <ul class="simple-list">
        <li><a href="corsidilaurea/index.html" id="link-courses">Degree Courses</a></li>
        <li><a href="lecturers/en/index.html" id="link-lecturers">Lecturers</a></li>
    </ul>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Detect user's browser language
            const userLang = navigator.language || navigator.userLanguage;
            const isItalian = userLang.toLowerCase().startsWith('it');
            
            // Localize main page UI elements if Italian is detected
            if (isItalian) {
                document.documentElement.lang = 'it';
                
                const themeBtn = document.getElementById('themeBtn');
                if (themeBtn) themeBtn.innerHTML = '🌓 Tema';
                
                const linkCourses = document.getElementById('link-courses');
                if (linkCourses) linkCourses.textContent = 'Corsi di Laurea';

                const linkLecturers = document.getElementById('link-lecturers');
                if (linkLecturers) {
                    linkLecturers.textContent = 'Docenti';
                    linkLecturers.href = 'lecturers/it/index.html';
                }
            }

            // Determine which panel file to fetch based on language
            const panelFile = isItalian ? 'assets/theme-panel-it.html' : 'assets/theme-panel-en.html';

            // Fetch and inject the appropriate theme panel
            fetch(panelFile)
                .then(response => {
                    if (!response.ok) throw new Error("Failed to load theme panel resource.");
                    return response.text();
                })
                .then(html => {
                    // Inject the HTML into the container
                    document.getElementById('theme-panel-container').innerHTML = html;
                    
                    // Manually initialize the panel UI logic if the script is ready
                    if (typeof window.initThemePanel === 'function') {
                        window.initThemePanel();
                    }
                })
                .catch(error => {
                    console.error('Error loading the theme panel:', error);
                });
        });
    </script>

</body>
</html>
